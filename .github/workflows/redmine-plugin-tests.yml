name: redmine-plugin-tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-20.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - redmine: 3.4.7
            ruby: '2.1.5'
          - redmine: 3.3.9
            ruby: '2.1.5'
          - redmine: 3.2.9
            ruby: '2.1.5'
          - redmine: 3.1.7
            ruby: '2.1.5'
          - redmine: 3.0.7
            ruby: '2.1.5'
          - redmine: 2.6.10
            ruby: '2.1.5'
          - redmine: 2.5.3
            ruby: '1.9.3'
          - redmine: 4.0.0
            ruby: '2.2.3'
          - redmine: 5.0.0
            ruby: '2.7.8'
          - redmine: 6.0-stable
            ruby: '3.1.6'
          - redmine: 6.1-stable
            ruby: '3.2.5'

    env:
      PLUGIN_NAME: computed_custom_field
      REDMINE_PATH: ${{ github.workspace }}/redmine
      RAILS_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 libsqlite3-dev

      - name: Checkout Redmine
        run: |
          git clone -b "${{ matrix.redmine }}" --single-branch https://github.com/redmine/redmine.git "$REDMINE_PATH"
          ln -s "$GITHUB_WORKSPACE" "$REDMINE_PATH/plugins/$PLUGIN_NAME"
          cp config/database.yml.travis "$REDMINE_PATH/config/database.yml"

      - name: Install compatible bundler
        working-directory: ${{ env.REDMINE_PATH }}
        run: |
          case "${{ matrix.redmine }}" in
            2.5.3|2.6.10|3.0.7|3.1.7|3.2.9|3.3.9|3.4.7)
              BUNDLER_VERSION="1.17.3"
              ;;
            *)
              BUNDLER_VERSION="2.3.27"
              ;;
          esac
          gem install bundler -v "$BUNDLER_VERSION"
          echo "BUNDLER_VERSION=$BUNDLER_VERSION" >> "$GITHUB_ENV"

      - name: Redmine patch for old versions
        if: ${{ startsWith(matrix.redmine, '2.') || matrix.redmine == '3.0.7' || matrix.redmine == '3.1.7' }}
        working-directory: ${{ env.REDMINE_PATH }}
        run: |
          if [ -f lib/tasks/redmine.rake ]; then
            curl -sS "http://www.redmine.org/projects/redmine/repository/revisions/14891/diff/trunk/lib/tasks/redmine.rake?format=diff" > redmine.rake.patch
            patch lib/tasks/redmine.rake redmine.rake.patch
          fi

      - name: Bundle install
        working-directory: ${{ env.REDMINE_PATH }}
        run: |
          bundle config set path vendor/bundle
          bundle config set without 'development'
          bundle _${BUNDLER_VERSION}_ install

      - name: Prepare database
        working-directory: ${{ env.REDMINE_PATH }}
        run: |
          bundle exec rake db:create
          bundle exec rake db:migrate
          bundle exec rake redmine:plugins:migrate

      - name: Run unit tests
        working-directory: ${{ env.REDMINE_PATH }}
        run: bundle exec rake redmine:plugins:test:units NAME=$PLUGIN_NAME
