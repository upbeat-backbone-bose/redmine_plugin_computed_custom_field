name: redmine-plugin-tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        redmine:
          - 2.5-stable
          - 2.6-stable
          - 3.0-stable
          - 3.1-stable
          - 3.2-stable
          - 3.3-stable
          - 3.4-stable
          - 4.0-stable
          - 5.0-stable
          - 6.0-stable
          - 6.1-stable

    env:
      PLUGIN_NAME: computed_custom_field
      REDMINE_PATH: ${{ github.workspace }}/redmine
      RAILS_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 libsqlite3-dev

      - name: Checkout Redmine
        run: |
          git clone -b "${{ matrix.redmine }}" --single-branch https://github.com/redmine/redmine.git "$REDMINE_PATH"
          ln -s "$GITHUB_WORKSPACE" "$REDMINE_PATH/plugins/$PLUGIN_NAME"
          cp config/database.yml.travis "$REDMINE_PATH/config/database.yml"

      - name: Resolve Ruby version
        id: ruby
        working-directory: ${{ env.REDMINE_PATH }}
        run: |
          if [ -f .ruby-version ]; then
            version="$(cat .ruby-version)"
          else
            version="$(grep -E "^ruby ['\\\"]" Gemfile | head -n 1 | sed -E "s/^ruby ['\\\"]([^'\\\"]+)['\\\"].*/\\1/")"
          fi
          if [ -z "$version" ]; then
            case "${{ matrix.redmine }}" in
              2.5-stable|2.6-stable) version="2.3.8" ;;
              3.0-stable|3.1-stable|3.2-stable) version="2.2.10" ;;
              3.3-stable) version="2.3.8" ;;
              3.4-stable) version="2.4.10" ;;
              4.0-stable) version="2.6.10" ;;
              5.0-stable) version="2.7.8" ;;
              6.0-stable) version="3.1.6" ;;
              6.1-stable) version="3.2.5" ;;
              *) echo "No Ruby version mapping for ${{ matrix.redmine }}"; exit 1 ;;
            esac
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.ruby.outputs.version }}

      - name: Bundle install
        working-directory: ${{ env.REDMINE_PATH }}
        run: |
          bundle config set path vendor/bundle
          bundle config set without 'development'
          bundle install

      - name: Prepare database
        working-directory: ${{ env.REDMINE_PATH }}
        run: |
          bundle exec rake db:create
          bundle exec rake db:migrate
          bundle exec rake redmine:plugins:migrate

      - name: Run unit tests
        working-directory: ${{ env.REDMINE_PATH }}
        run: bundle exec rake redmine:plugins:test:units NAME=$PLUGIN_NAME
